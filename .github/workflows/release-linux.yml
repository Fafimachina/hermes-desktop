name: Release Linux Build

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_linux:
    name: Build and publish Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate release metadata
        id: meta
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          tag="release-v${version}-${short_sha}"
          release_name="Hermes Desktop v${version} (${short_sha})"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

      - name: Build app
        run: npm run build

      - name: Package Linux artifacts
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          append_body: true
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
